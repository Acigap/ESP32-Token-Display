; ============================================================
;  POC: Waveshare ESP32-S3-Touch-LCD-1.9
;  Board: ESP32-S3R8 (Xtensa LX7 dual-core, 240 MHz, 8 MB PSRAM, 16 MB Flash)
;  Display: ST7789  170×320 px  (landscape -> 320×170)
;  Touch:   CST816  capacitive (I2C, addr 0x15)
; ============================================================
;
;  Official Waveshare pinout (from product page):
;  ┌─────────────┬────────┐  ┌─────────────┬────────┐
;  │ LCD_RST     │ GPIO 9 │  │ TP_RST      │ GPIO17 │  (NC)
;  │ LCD_CLK     │ GPIO10 │  │ TP_INT      │ GPIO21 │
;  │ LCD_DC      │ GPIO11 │  │ TP_SDA      │ GPIO47 │
;  │ LCD_CS      │ GPIO12 │  │ TP_SCL      │ GPIO48 │
;  │ LCD_DIN     │ GPIO13 │  └─────────────┴────────┘
;  │ LCD_BL      │ GPIO14 │  (active HIGH per ST7789 module)
;  └─────────────┴────────┘
;
;  Why Arduino_GFX (not TFT_eSPI):
;   - TFT_eSPI v2.5.43 crashes on Arduino-ESP32 v3.x (StoreProhibited in SPI HAL)
;   - Same approach already proven on sister POC: poc/esp32c6_lcd_1_9
;
;  Build & flash:
;    cd poc/esp32s3_touch_lcd_1_9
;    pio run -e esp32s3-touch-lcd-1_9-poc --target upload
;  Monitor:
;    pio device monitor -p COM5 -b 115200

[env:esp32s3-touch-lcd-1_9-poc]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino

; ── Ports ────────────────────────────────────────────────────────────────────
upload_port   = COM5
monitor_port  = COM5
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed  = 921600

; ── Board / memory ────────────────────────────────────────────────────────────
; Chip is ESP32-S3R8 (AP_3v3) which has 8MB Octal PSRAM — must use qio_opi.
; (Default quad PSRAM init panics with "PSRAM chip is not connected,
;  or wrong PSRAM line mode" → LoadProhibited at 0x00000004.)
board_build.flash_size            = 16MB
board_build.partitions            = huge_app.csv
board_build.arduino.memory_type   = qio_opi
board_upload.flash_size           = 16MB
board_upload.maximum_size         = 3145728

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OCT

; ── Libraries ─────────────────────────────────────────────────────────────────
lib_deps =
    moononournation/GFX Library for Arduino@^1.5.0
