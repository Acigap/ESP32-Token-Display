<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Chip body -->
  <rect x="6" y="6" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
  <!-- Inner core -->
  <rect x="9" y="9" width="6" height="6" rx="0.5" stroke="currentColor" stroke-width="1"/>
  <!-- Pins - left -->
  <line x1="2.5" y1="9"  x2="6"   y2="9"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2.5" y1="12" x2="6"   y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2.5" y1="15" x2="6"   y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins - right -->
  <line x1="18"  y1="9"  x2="21.5" y2="9"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18"  y1="12" x2="21.5" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18"  y1="15" x2="21.5" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins - top -->
  <line x1="9"  y1="2.5" x2="9"  y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="2.5" x2="15" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins - bottom -->
  <line x1="9"  y1="18" x2="9"  y2="21.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="18" x2="15" y2="21.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
