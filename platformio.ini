; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32@6.8.1
board = esp32dev
framework = arduino
upload_port = COM6
monitor_port = COM6
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags = 
	-DCORE_DEBUG_LEVEL=3
	-DUSER_SETUP_LOADED=1
	-DST7789_DRIVER=1
	-DTFT_WIDTH=170
	-DTFT_HEIGHT=320
	-DTFT_MOSI=23
	-DTFT_SCLK=18
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=4
	-DTFT_BL=32
	-DTFT_BACKLIGHT_ON=1
	-DLOAD_GLCD=1
	-DLOAD_FONT2=1
	-DLOAD_FONT4=1
	-DLOAD_FONT6=1
	-DLOAD_FONT7=1
	-DLOAD_FONT8=1
	-DLOAD_GFXFF=1
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=80000000
	-DSPI_READ_FREQUENCY=20000000
lib_deps = 
	bodmer/TFT_eSPI@^2.5.43
	bblanchon/ArduinoJson@^7.0.4
upload_speed = 921600

; ── Waveshare ESP32-S3-Touch-LCD-1.9 ─────────────────────────────────────────
; ESP32-S3R8 (8MB octal PSRAM, 16MB flash), ST7789 1.9" 170x320, CST816 touch.
; Touch: tap screen to cycle API keys (replaces BOOT button).
;
; Uses Arduino_GFX instead of TFT_eSPI because TFT_eSPI 2.5.43 crashes on
; Arduino-ESP32 v3.x (pioarduino) with a StoreProhibited inside the SPI HAL.
; The Display abstraction in include/GfxDisplay.h hides the swap from DisplayUI.
;
; Octal PSRAM (qio_opi) is required — default quad init panics with
; "PSRAM chip is not connected, or wrong PSRAM line mode".
[env:esp32s3-touch-lcd-1_9]
platform    = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board       = esp32-s3-devkitc-1
framework   = arduino
upload_port = COM5
monitor_port = COM5
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
board_build.flash_size          = 16MB
board_build.partitions          = huge_app.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 3145728
build_flags =
	-DCORE_DEBUG_LEVEL=3
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DBOARD_HAS_PSRAM
	-DCONFIG_SPIRAM_MODE_OCT
	-DBOARD_S3_TOUCH_LCD=1
lib_deps =
	moononournation/GFX Library for Arduino@^1.5.0
	bblanchon/ArduinoJson@^7.0.4

; ── TTGO T-Display (ESP32 + ST7789 1.14" 135×240) ────────────────────────────
; Landscape mode: 240×135  |  BOOT=GPIO0 cycles keys, BTN2=GPIO35 (unused)
; Pinout: MOSI=19 SCLK=18 CS=5 DC=16 RST=23 BL=4
[env:ttgo-t-display]
platform = espressif32@6.8.1
board    = esp32dev
framework = arduino
upload_port = COM7
monitor_port = COM7
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
	-DCORE_DEBUG_LEVEL=3
	-DBOARD_TTGO_T_DISPLAY=1
	-DUSER_SETUP_LOADED=1
	-DST7789_DRIVER=1
	-DTFT_WIDTH=135
	-DTFT_HEIGHT=240
	-DTFT_MOSI=19
	-DTFT_SCLK=18
	-DTFT_CS=5
	-DTFT_DC=16
	-DTFT_RST=23
	-DTFT_BL=4
	-DTFT_BACKLIGHT_ON=1
	-DSCREEN_WIDTH=240
	-DSCREEN_HEIGHT=135
	-DLOAD_GLCD=1
	-DLOAD_FONT2=1
	-DLOAD_FONT4=1
	-DLOAD_FONT6=1
	-DLOAD_FONT7=1
	-DLOAD_FONT8=1
	-DLOAD_GFXFF=1
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=6000000
lib_deps =
	bodmer/TFT_eSPI@^2.5.43
	bblanchon/ArduinoJson@^7.0.4
upload_speed = 921600
